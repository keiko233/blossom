name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide which images need building: only the ones whose sources changed.
  # Tag pushes and manual dispatches always build everything.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/docker.yml'
            server-agent:
              - 'server-agent/**'
              - '.github/workflows/docker.yml'

      - id: targets
        env:
          APP_CHANGED: ${{ steps.filter.outputs.app }}
          AGENT_CHANGED: ${{ steps.filter.outputs['server-agent'] }}
          BUILD_ALL: ${{ github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' }}
        run: |
          targets=$(jq -cn \
            --arg repo "ghcr.io/$GITHUB_REPOSITORY" \
            --arg app "$APP_CHANGED" \
            --arg agent "$AGENT_CHANGED" \
            --arg all "$BUILD_ALL" '
            []
            + (if $all == "true" or $app == "true" then [{
                name: "app",
                context: ".",
                image: $repo,
                "cache-path": "pnpm-store",
                "cache-map": {"pnpm-store": "/pnpm/store"}
              }] else [] end)
            + (if $all == "true" or $agent == "true" then [{
                name: "server-agent",
                context: "./server-agent",
                image: ($repo + "/server-agent"),
                "cache-path": "go-pkg-mod\ngo-build-cache\ncargo-registry\ncargo-target",
                "cache-map": {
                  "go-pkg-mod": "/go/pkg/mod",
                  "go-build-cache": "/root/.cache/go-build",
                  "cargo-registry": "/usr/local/cargo/registry",
                  "cargo-target": "/app/target"
                }
              }] else [] end)')
          echo "targets=$targets" >> "$GITHUB_OUTPUT"
          echo "building: $(jq -r 'map(.name) | join(", ") | if . == "" then "(nothing)" else . end' <<< "$targets")"

  # Build each image natively per architecture (no QEMU emulation) and push
  # by digest; the merge job below assembles the multi-arch manifest.
  build:
    needs: prepare
    if: needs.prepare.outputs.targets != '[]'
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets) }}
        platform:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Persist the Dockerfile RUN cache mounts (pnpm store, go mod/build,
      # cargo registry/target) across runs — ephemeral runners lose them.
      - name: Restore build cache mounts
        id: cache-mounts
        uses: actions/cache@v4
        with:
          path: ${{ matrix.target['cache-path'] }}
          key: cache-mounts-${{ matrix.target.name }}-${{ matrix.platform.arch }}-${{ hashFiles('pnpm-lock.yaml', 'server-agent/Cargo.lock') }}
          restore-keys: |
            cache-mounts-${{ matrix.target.name }}-${{ matrix.platform.arch }}-

      - name: Inject cache mounts into buildkit
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          cache-map: ${{ toJSON(matrix.target['cache-map']) }}
          skip-extraction: ${{ steps.cache-mounts.outputs.cache-hit }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.target.context }}
          platforms: linux/${{ matrix.platform.arch }}
          outputs: type=image,name=${{ matrix.target.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.target.name }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target.name }}-${{ matrix.platform.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.target.name }}-${{ matrix.platform.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-arch digests into one tagged multi-arch manifest per image.
  merge:
    needs: [prepare, build]
    if: needs.prepare.outputs.targets != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets) }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.target.name }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.target.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ matrix.target.image }}@sha256:%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect ${{ matrix.target.image }}:${{ steps.meta.outputs.version }}
