services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: blossom
      POSTGRES_USER: blossom
      POSTGRES_PASSWORD: blossom
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blossom"]
      interval: 5s
      retries: 10
  migrate:
    build:
      context: .
      target: builder
    working_dir: /repo/app
    command: pnpm db:migrate
    environment:
      DATABASE_URL: postgresql://blossom:blossom@db:5432/blossom
    depends_on:
      db:
        condition: service_healthy
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://blossom:blossom@db:5432/blossom
      DATABASE_DRIVER: node-postgres
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: change-me
      # Optional: displayed app name (defaults to Blossom)
      # APP_NAME: Blossom
      # Optional: Resend email integration
      # RESEND_API_KEY:
      # RESEND_MAIL_FROM:
      # Optional: OAuth providers
      # GITHUB_CLIENT_ID:
      # GITHUB_CLIENT_SECRET:
      # GOOGLE_CLIENT_ID:
      # GOOGLE_CLIENT_SECRET:
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
volumes:
  pgdata:
