services:
  agent:
    # Build the image (agent + bundled sing-box) from the local Dockerfile.
    build:
      context: .
      dockerfile: Dockerfile
    # Or pin a prebuilt image instead of building:
    # image: ghcr.io/keiko233/blossom/server-agent:latest
    container_name: blossom-agent
    restart: unless-stopped

    # sing-box binds arbitrary inbound ports and forwards real traffic, so it
    # runs on the host network rather than a bridged, port-mapped namespace.
    network_mode: host

    # NET_ADMIN + the tun device are required for tun-type inbounds; harmless
    # for purely socket-based inbounds (vmess/vless/trojan/…).
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun

    environment:
      # Base URL of the blossom API, including the /api prefix.
      AGENT_URL: ${AGENT_URL:?set AGENT_URL in .env}
      # Per-server token (shown once at server creation or token reset).
      AGENT_TOKEN: ${AGENT_TOKEN:?set AGENT_TOKEN in .env}
      # trace | debug | info | warn | error
      AGENT_LOG_LEVEL: ${AGENT_LOG_LEVEL:-info}

    volumes:
      # Persists the last-known-good config so an invalid future candidate can
      # never strand the host after an agent/container restart.
      - agent-state:/var/lib/blossom-agent

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  agent-state:
